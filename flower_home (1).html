  /* floral border art, reused top (flipped) and bottom (normal) */
  .floral{
    position:absolute;
    left:0;
    width:100%;
    height:auto;
    pointer-events:none;
    z-index:1;
    -webkit-user-select:none;
    user-select:none;
  }
  .floral.top{
    top:0;
    transform:scaleY(-1);
  }
  .floral.bottom{
    bottom:-100px;
  }

  .stage{
    position:relative;
    z-index:2;
    min-height:100vh;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:7vh 5vw 10vh;
  }

    font-family:'Parisienne', cursive;

      0 2px 4px rgba(214,90,158,0.55),
      0 6px 14px rgba(180,60,130,0.35);
    margin:2vh 0 9vh 0;
    text-align:center;
    letter-spacing:0.5px;
  }

    display:flex;
    flex-direction:column;
    gap:22px;
    width:100%;
